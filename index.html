<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Ashish Dahiya</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

<body>

  <!-- ── ANIMATED SVG BACKGROUND ── -->
  <div class="bg-layer" aria-hidden="true">
    <svg class="bg-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
      <defs>
        <!-- Aurora blobs -->
        <radialGradient id="g1" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#00ffe7" stop-opacity="0.35"/>
          <stop offset="100%" stop-color="#00ffe7" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="g2" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#7b5fff" stop-opacity="0.40"/>
          <stop offset="100%" stop-color="#7b5fff" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="g3" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#ff6fd8" stop-opacity="0.30"/>
          <stop offset="100%" stop-color="#ff6fd8" stop-opacity="0"/>
        </radialGradient>
        <filter id="blur-heavy">
          <feGaussianBlur stdDeviation="60"/>
        </filter>
        <filter id="blur-mid">
          <feGaussianBlur stdDeviation="30"/>
        </filter>
      </defs>

      <!-- Deep background -->
      <rect width="1440" height="900" fill="#040813"/>

      <!-- Aurora blobs -->
      <ellipse class="blob b1" cx="300"  cy="200" rx="420" ry="300" fill="url(#g2)" filter="url(#blur-heavy)"/>
      <ellipse class="blob b2" cx="1100" cy="650" rx="380" ry="260" fill="url(#g1)" filter="url(#blur-heavy)"/>
      <ellipse class="blob b3" cx="900"  cy="150" rx="300" ry="220" fill="url(#g3)" filter="url(#blur-heavy)"/>
      <ellipse class="blob b4" cx="200"  cy="750" rx="260" ry="180" fill="url(#g1)" filter="url(#blur-heavy)"/>

      <!-- Grid lines -->
      <g class="grid-lines" stroke="rgba(255,255,255,0.04)" stroke-width="1">
        <line x1="0"    y1="150" x2="1440" y2="150"/>
        <line x1="0"    y1="300" x2="1440" y2="300"/>
        <line x1="0"    y1="450" x2="1440" y2="450"/>
        <line x1="0"    y1="600" x2="1440" y2="600"/>
        <line x1="0"    y1="750" x2="1440" y2="750"/>
        <line x1="180"  y1="0"   x2="180"  y2="900"/>
        <line x1="360"  y1="0"   x2="360"  y2="900"/>
        <line x1="540"  y1="0"   x2="540"  y2="900"/>
        <line x1="720"  y1="0"   x2="720"  y2="900"/>
        <line x1="900"  y1="0"   x2="900"  y2="900"/>
        <line x1="1080" y1="0"   x2="1080" y2="900"/>
        <line x1="1260" y1="0"   x2="1260" y2="900"/>
      </g>

      <!-- Floating particles (dots) -->
      <g class="particles">
        <circle class="p" cx="120"  cy="80"  r="2" fill="#00ffe7" opacity="0.7"/>
        <circle class="p" cx="400"  cy="320" r="1.5" fill="#fff"   opacity="0.5"/>
        <circle class="p" cx="700"  cy="100" r="2.5" fill="#7b5fff" opacity="0.8"/>
        <circle class="p" cx="950"  cy="420" r="1.5" fill="#00ffe7" opacity="0.6"/>
        <circle class="p" cx="1200" cy="200" r="2"   fill="#ff6fd8" opacity="0.7"/>
        <circle class="p" cx="250"  cy="550" r="1.5" fill="#fff"   opacity="0.4"/>
        <circle class="p" cx="600"  cy="700" r="2"   fill="#7b5fff" opacity="0.6"/>
        <circle class="p" cx="1350" cy="500" r="1.5" fill="#00ffe7" opacity="0.5"/>
        <circle class="p" cx="80"   cy="400" r="2"   fill="#ff6fd8" opacity="0.6"/>
        <circle class="p" cx="1100" cy="820" r="1.5" fill="#fff"   opacity="0.4"/>
        <circle class="p" cx="850"  cy="600" r="2"   fill="#00ffe7" opacity="0.5"/>
        <circle class="p" cx="450"  cy="800" r="1.5" fill="#7b5fff" opacity="0.6"/>
        <circle class="p" cx="1300" cy="80"  r="2"   fill="#ff6fd8" opacity="0.5"/>
        <circle class="p" cx="550"  cy="450" r="1"   fill="#fff"   opacity="0.35"/>
        <circle class="p" cx="1050" cy="300" r="2"   fill="#00ffe7" opacity="0.55"/>
      </g>

      <!-- Diagonal accent lines -->
      <line class="accent-line" x1="0" y1="900" x2="600" y2="0"   stroke="rgba(0,255,231,0.06)" stroke-width="1.5"/>
      <line class="accent-line" x1="840" y1="900" x2="1440" y2="0" stroke="rgba(123,95,255,0.06)" stroke-width="1.5"/>
    </svg>
  </div>

        <defs>
          <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
